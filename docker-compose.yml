version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./database:/app/database
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - DEBUG=false
      - UPLOAD_DIR=/app/uploads
      - DATABASE_DIR=/app/database
      - MODELS_DIR=/app/models
      - LOGS_DIR=/app/logs
      - LLM_CONTEXT_SIZE=2048
      - LLM_THREADS=4
      - OCR_LANGUAGE=eng
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
